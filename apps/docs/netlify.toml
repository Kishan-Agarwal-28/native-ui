[build]
  publish = ".next"
  command = "cd ../.. && pnpm turbo run build --filter @repo/docs"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "esbuild"

[dev]
  framework = "#custom"
  command = "pnpm dev"
  port = 3000

[[plugins]]
  package = "@netlify/plugin-nextjs"