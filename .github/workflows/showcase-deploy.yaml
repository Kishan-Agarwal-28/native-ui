name: Deploy native-ui showcase

on:
  push:
    branches:
      - prod/showcase
      - prod/all

concurrency:
  group: showcase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SHOWCASE_SITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Turborepo GitHub cache
        uses: rharkor/caching-for-turbo@v2.3.13

      - name: Build Expo Web
        run: pnpm turbo run build --filter=@repo/showcase

      - name: Install netlify CLI
        run: pnpm add -g netlify-cli

      - name: Deploy to Netlify
        run: |
          netlify deploy \
            --prod \
            --no-build \
            --dir=apps/showcase/dist \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --message "Showcase deployed via GitHub Actions"